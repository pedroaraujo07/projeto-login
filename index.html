<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/tablet.css">
    <link rel="stylesheet" href="styles/others.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=key,person" />
    
</head>
<body>
    <main>
        <section>

            <div id="div-image">
                
            </div>

            <div id="div-form">

                <h1>Login</h1>

                <p id="p">Seja bem-vindo(a) novamente! Faça login para acessar sua conta.</p>
                
                <form action="cadastro.php" method="post" autocomplete="on">

                    <p class="box1">
                        <label for="email"><span class="material-symbols-outlined">person</span></label>
                        <input type="email" name="email" id="email" class="input1" required maxlength="40" placeholder="seu e-mail">
                    </p>

                    <p class="box1">
                        <label for="senha"><span class="material-symbols-outlined">key</span></label>
                        <input type="password" name="senha" id="senha" class="input1" required minlength="8" maxlength="20" placeholder="sua senha">
                    </p>

                    <p><input type="submit" value="Entrar" class="box2" id="botao-entrar"></p>

                    <p><a href="cadastro.php"><input type="button" value="Esqueci a senha" class="box2" id="botao-esqueci-senha"></a></p>

                </form>
            </div>

        </section>
    </main>
</body>
</html>
